[project]
name = "alpamayo1-sft"
version = "0.1.0"
requires-python = "==3.12.*"
dependencies = [
  "alpamayo_r1",  # inference models, action_space, geometry.rotation, common.logging, etc.
  "alpamayo-recipes",  # recipe-side utilities (chat_template, data, metrics, common, etc.)
  "accelerate>=1.12.0",
  "av>=16.0.1",
  "einops>=0.8.1",
  "hydra-colorlog>=1.2.0",
  "hydra-core>=1.3.2",
  "mediapy>=1.2.4",
  "opencv-python>=4.10.0",
  "pandas>=2.3.3",
  "physical_ai_av>=0.2.0",
  "pillow>=12.0.0",
  "torch==2.8.0",
  "torchvision>=0.23.0",
  "transformers==4.57.1",
  # "flash-attn>=2.8.3",
  "rich>=14.3.3",
  "wandb>=0.25.0",
  "torchmetrics==1.8.2",
  "deepspeed==0.18.2",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

# Look one level up (recipes/) so setuptools finds alpamayo1_sft/ as a proper package.
# The editable install adds recipes/ to sys.path, making `alpamayo1_sft` importable
# from within this directory once the venv is active.
[tool.setuptools.packages.find]
where = [".."]
include = ["alpamayo1_sft*"]

[dependency-groups]
dev = [
  "matplotlib>=3.10.7",
  "mediapy>=1.2.4",
  "ipykernel>=6.29.3",
  "ipywidgets>=8.1.8",
  "tqdm",
]

[tool.uv]
# no-build-isolation-package = ["flash-attn"]

[tool.uv.sources]
alpamayo_r1 = { path = "/data/lmc/alpamayo_workspace/alpamayo" }
alpamayo-recipes = { path = "../../src", editable = true }

[tool.ruff]
line-length = 100
